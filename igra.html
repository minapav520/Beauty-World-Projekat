<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty World | 🎮 Igra Memorije</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="SLIKE/favicon.png" />
    <link rel="stylesheet" href="CSS/style.css" />
    <style>
      .memory-game {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        max-width: 500px;
        margin: 20px auto;
      }
      .memory-card {
        height: 100px;
        background: var(--bebi-roze);
        border-radius: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        transition:
          transform 0.3s,
          background 0.3s;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        user-select: none;
      }
      .memory-card.flipped {
        background: white;
        transform: rotateY(180s);
      }
      .memory-card.matched {
        background: #e0f2f1;
        cursor: default;
        border: 2px solid #b2dfdb;
      }
      #game-message {
        font-weight: bold;
        color: var(--tamno-roze);
        height: 30px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg custom-nav sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span>✨</span> Beauty World <span>💄</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">🏠 Početna</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="beauty.html">🌸 Nega i Estetika</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="galerija.html">🖼️ Galerija</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="multimedija.html"
                >📂 Media & Dokumenti</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="kviz.html">📝 Kviz</a>
            </li>
            <li class="nav-item">
              <a class="nav-link btn-igra active" href="igra.html">🎮 IGRA</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5 text-center">
      <h2 class="mb-4">✨ Pronađi parove kozmetike ✨</h2>

      <div class="game-stats mb-4">
        <div class="stat-item">🏆 Poeni: <span id="score">0</span></div>
        <div class="stat-item">⏱️ Vreme: <span id="timer">45</span>s</div>
      </div>

      <p id="game-message"></p>

      <div class="memory-game" id="game-board"></div>

      <button class="btn btn-custom mt-4" onclick="resetGame()">
        Ponovo pokreni 🔄
      </button>
    </div>

    <footer class="text-center py-5 mt-5">
      <div class="container">
        <div class="footer-emoji">💖 ✨ 🧴</div>
        <p>&copy; 2025 Osnove Multimedijalnih Tehnologija</p>
      </div>
    </footer>

    <script>
      const symbols = [
        "💄",
        "💄",
        "💅",
        "💅",
        "🧴",
        "🧴",
        "🧖",
        "🧖",
        "🎨",
        "🎨",
        "🛍️",
        "🛍️",
        "✨",
        "✨",
        "👄",
        "👄",
      ];
      let flippedCards = [];
      let matchedPairs = 0;
      let score = 0;
      let timeLeft = 45;
      let timerInterval;
      let gameActive = true;

      const board = document.getElementById("game-board");
      const scoreDisplay = document.getElementById("score");
      const timerDisplay = document.getElementById("timer");
      const messageDisplay = document.getElementById("game-message");

      function initGame() {
        gameActive = true;
        timeLeft = 45;
        score = 0;
        matchedPairs = 0;
        flippedCards = [];
        scoreDisplay.innerText = score;
        timerDisplay.innerText = timeLeft;
        messageDisplay.innerText = "";
        board.innerHTML = "";

        let shuffled = symbols.sort(() => 0.5 - Math.random());

        shuffled.forEach((symbol) => {
          const card = document.createElement("div");
          card.className = "memory-card";
          card.dataset.val = symbol;
          card.innerText = "?";
          card.onclick = () => flipCard(card);
          board.appendChild(card);
        });

        startTimer();
      }

      function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          timeLeft--;
          timerDisplay.innerText = timeLeft;
          if (timeLeft <= 0) {
            endGame(false);
          }
        }, 1000);
      }

      function flipCard(card) {
        if (
          !gameActive ||
          card.classList.contains("flipped") ||
          card.classList.contains("matched") ||
          flippedCards.length === 2
        ) {
          return;
        }

        card.innerText = card.dataset.val;
        card.classList.add("flipped");
        flippedCards.push(card);

        if (flippedCards.length === 2) {
          checkMatch();
        }
      }

      function checkMatch() {
        const [card1, card2] = flippedCards;
        if (card1.dataset.val === card2.dataset.val) {
          card1.classList.add("matched");
          card2.classList.add("matched");
          score += 10;
          scoreDisplay.innerText = score;
          matchedPairs++;
          flippedCards = [];

          if (matchedPairs === symbols.length / 2) {
            endGame(true);
          }
        } else {
          setTimeout(() => {
            card1.innerText = "?";
            card2.innerText = "?";
            card1.classList.remove("flipped");
            card2.classList.remove("flipped");
            flippedCards = [];
          }, 800);
        }
      }

      function endGame(win) {
        gameActive = false;
        clearInterval(timerInterval);
        if (win) {
          messageDisplay.innerText = "Čestitamo! Pobedili ste! 🎉";
          messageDisplay.style.color = "#4caf50";
        } else {
          messageDisplay.innerText = "Isteklo je vreme! Pokušajte ponovo. 💔";
          messageDisplay.style.color = "#f44336";
          document
            .querySelectorAll(".memory-card")
            .forEach((c) => (c.innerText = c.dataset.val));
        }
      }

      function resetGame() {
        initGame();
      }

      initGame();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
