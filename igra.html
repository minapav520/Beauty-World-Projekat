<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty World | 🏆 Beauty Akademija</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="SLIKE/favicon.png" />
    <link rel="stylesheet" href="CSS/style.css" />
    <style>
      :root {
        --bebi-roze: #fce4ec;
        --tamno-roze: #ad1457;
        --svetlo-zelena: #e0f2f1;
      }

      body {
        background-color: #fffafb;
        font-family: "Segoe UI", sans-serif;
      }

      .level-nav {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      .level-btn {
        background: white;
        border: 2px solid var(--bebi-roze);
        color: var(--tamno-roze);
        border-radius: 25px;
        padding: 10px 20px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .level-btn.active {
        background: var(--tamno-roze) !important;
        color: white !important;
        border-color: var(--tamno-roze) !important;
      }

      .game-area {
        display: none;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        text-align: center;
        position: relative;
        min-height: 300px;
      }
      .game-area.active {
        display: block;
      }

      .stat-box {
        background: #fff0f5;
        padding: 8px 15px;
        border-radius: 15px;
        font-weight: bold;
        color: var(--tamno-roze);
        display: inline-block;
        margin: 5px;
      }

      .btn-start,
      .btn-restart {
        background: var(--tamno-roze);
        color: white;
        border: none;
        border-radius: 20px;
        padding: 10px 25px;
        font-weight: bold;
        margin-top: 15px;
        transition: 0.3s;
        cursor: pointer;
      }
      .btn-start:hover,
      .btn-restart:hover {
        background: #880e4f;
        transform: scale(1.05);
      }

      .game-over-panel {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .memory-board {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        max-width: 400px;
        margin: 20px auto;
      }
      .memory-card {
        height: 80px;
        background: var(--bebi-roze);
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        user-select: none;
      }
      .memory-card.flipped {
        background: white;
        border: 2px solid var(--bebi-roze);
      }
      .memory-card.matched {
        background: var(--svetlo-zelena);
        opacity: 0.6;
        cursor: default;
      }

      #catch-viewport {
        width: 100%;
        height: 400px;
        background: #fff5f8;
        border: 2px solid var(--bebi-roze);
        border-radius: 15px;
        position: relative;
        overflow: hidden;
        touch-action: none;
        margin-top: 20px;
      }
      #basket {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 45px;
        z-index: 10;
        pointer-events: none;
      }
      .falling-item {
        position: absolute;
        font-size: 30px;
        z-index: 5;
      }

      .rhythm-board {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        max-width: 300px;
        margin: 20px auto;
      }
      .rhythm-btn {
        height: 100px;
        background: white;
        border: 3px solid var(--bebi-roze);
        border-radius: 20px;
        font-size: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        opacity: 0.5;
      }
      .rhythm-btn.highlight {
        opacity: 1;
        background: var(--bebi-roze);
        border-color: var(--tamno-roze);
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg custom-nav sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span>✨</span> Beauty World <span>💄</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">🏠 Početna</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="beauty.html">🌸 Nega i Estetika</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="galerija.html">🖼️ Galerija</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="multimedija.html"
                >📂 Media & Dokumenti</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="izvori.html">📚 Literatura</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="kviz.html">📝 Kviz</a>
            </li>
            <li class="nav-item">
              <a class="btn-igra" href="igra.html">🎮 IGRA</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4 text-center">
      <h2 class="mb-4">🎓 Beauty Akademija</h2>

      <div class="level-nav">
        <button id="btn-lvl1" class="level-btn active" onclick="loadLevel(1)">
          1. Memorija 🧩
        </button>
        <button id="btn-lvl2" class="level-btn" onclick="loadLevel(2)">
          2. Neseser 👝
        </button>
        <button id="btn-lvl3" class="level-btn" onclick="loadLevel(3)">
          3. Ritam 🎵
        </button>
      </div>

      <div id="game-over-container" class="game-area">
        <div class="game-over-panel" id="end-screen">
          <h3 id="end-title">Kraj igre!</h3>
          <p id="end-message"></p>
          <button class="btn-restart" onclick="restartCurrentLevel()">
            Igraj ponovo 🔄
          </button>
        </div>
      </div>

      <div id="game-lvl1" class="game-area active">
        <h4>🧩 Make-up Memorija</h4>
        <div id="ui-lvl1">
          <div class="stat-box">⏱️ <span id="mem-timer">45</span>s</div>
          <div class="stat-box">✅ <span id="mem-pairs">0</span>/6</div>
          <div id="memory-board" class="memory-board"></div>
        </div>
        <button id="start-lvl1" class="btn-start" onclick="startLevel1()">
          Započni izazov 🚀
        </button>
      </div>

      <div id="game-lvl2" class="game-area">
        <h4>👝 Neseser</h4>
        <div id="ui-lvl2">
          <div class="stat-box">🏆 Poeni: <span id="catch-score">0</span></div>
          <div class="stat-box">❤️ <span id="catch-lives">❤️❤️❤️</span></div>
          <div id="catch-viewport"><div id="basket">👝</div></div>
        </div>
        <button id="start-lvl2" class="btn-start" onclick="startLevel2()">
          Započni izazov 🚀
        </button>
      </div>

      <div id="game-lvl3" class="game-area">
        <h4>🎵 Beauty Ritam</h4>
        <div id="ui-lvl3">
          <div class="stat-box">Runda: <span id="rhythm-round">0</span>/5</div>
          <div
            id="rhythm-status"
            class="mt-2 fw-bold"
            style="color: var(--tamno-roze)"
          >
            Prati redosled!
          </div>
          <div id="rhythm-board" class="rhythm-board">
            <div class="rhythm-btn" id="r-0" onclick="rhythmClick(0)">💄</div>
            <div class="rhythm-btn" id="r-1" onclick="rhythmClick(1)">💅</div>
            <div class="rhythm-btn" id="r-2" onclick="rhythmClick(2)">🧴</div>
            <div class="rhythm-btn" id="r-3" onclick="rhythmClick(3)">✨</div>
          </div>
        </div>
        <button id="start-lvl3" class="btn-start" onclick="startLevel3()">
          Započni izazov 🚀
        </button>
      </div>
    </div>

    <script>
      let activeLevel = 1;

      function loadLevel(level) {
        activeLevel = level;
        stopAll();
        document
          .querySelectorAll(".game-area")
          .forEach((a) => a.classList.remove("active"));
        document
          .querySelectorAll(".level-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(`game-lvl${level}`).classList.add("active");
        document.getElementById(`btn-lvl${level}`).classList.add("active");

        document
          .getElementById("end-screen")
          .parentElement.classList.remove("active");
        document.getElementById("end-screen").style.display = "none";

        document.getElementById(`start-lvl${level}`).style.display =
          "inline-block";
        document.getElementById(`ui-lvl${level}`).style.display = "none";
      }

      function showEndScreen(title, message) {
        stopAll();
        document
          .querySelectorAll(".game-area")
          .forEach((a) => a.classList.remove("active"));
        const container = document.getElementById("game-over-container");
        container.classList.add("active");
        document.getElementById("end-screen").style.display = "flex";
        document.getElementById("end-title").innerText = title;
        document.getElementById("end-message").innerText = message;
      }

      function restartCurrentLevel() {
        loadLevel(activeLevel);
      }

      function stopAll() {
        clearInterval(memInterval);
        clearInterval(catchLoop);
        clearInterval(catchSpawn);
        gameActiveLvl2 = false;
        document.querySelectorAll(".falling-item").forEach((i) => i.remove());
      }

      let memInterval, memTime, memMatched;
      function startLevel1() {
        document.getElementById("start-lvl1").style.display = "none";
        document.getElementById("ui-lvl1").style.display = "block";
        const board = document.getElementById("memory-board");
        memTime = 45;
        memMatched = 0;
        let flipped = [];
        document.getElementById("mem-pairs").innerText = "0";
        board.innerHTML = "";
        let symbols = ["💄", "💅", "🧴", "✨", "👄", "🎨"];
        let cards = [...symbols, ...symbols].sort(() => 0.5 - Math.random());
        cards.forEach((s) => {
          const c = document.createElement("div");
          c.className = "memory-card";
          c.dataset.val = s;
          c.innerText = "?";
          c.onclick = () => {
            if (flipped.length < 2 && !c.classList.contains("flipped")) {
              c.innerText = s;
              c.classList.add("flipped");
              flipped.push(c);
              if (flipped.length === 2) {
                if (flipped[0].dataset.val === flipped[1].dataset.val) {
                  flipped.forEach((card) => card.classList.add("matched"));
                  memMatched++;
                  document.getElementById("mem-pairs").innerText = memMatched;
                  flipped = [];
                  if (memMatched === 6) {
                    showEndScreen("Pobeda! ✨", "Svi parovi su pronađeni.");
                  }
                } else {
                  setTimeout(() => {
                    flipped.forEach((card) => {
                      card.innerText = "?";
                      card.classList.remove("flipped");
                    });
                    flipped = [];
                  }, 700);
                }
              }
            }
          };
          board.appendChild(c);
        });
        memInterval = setInterval(() => {
          memTime--;
          document.getElementById("mem-timer").innerText = memTime;
          if (memTime <= 0) {
            showEndScreen("Vreme je isteklo! ⏱️", "Pokušaj ponovo da ubrzaš.");
          }
        }, 1000);
      }

      let catchLoop,
        catchSpawn,
        catchScore,
        catchLives,
        gameActiveLvl2 = false;
      function startLevel2() {
        document.getElementById("start-lvl2").style.display = "none";
        document.getElementById("ui-lvl2").style.display = "block";
        catchScore = 0;
        catchLives = 3;
        gameActiveLvl2 = true;
        document.getElementById("catch-score").innerText = "0";
        document.getElementById("catch-lives").innerText = "❤️❤️❤️";
        catchLoop = setInterval(updateCatch, 20);
        catchSpawn = setInterval(spawnCatch, 1000);
      }

      function spawnCatch() {
        if (!gameActiveLvl2) return;
        const item = document.createElement("div");
        item.className = "falling-item";
        const isGood = Math.random() > 0.3;
        item.innerText = isGood ? "💄" : "🤢";
        item.dataset.type = isGood ? "good" : "bad";
        item.style.left = Math.random() * 90 + "%";
        item.style.top = "-40px";
        document.getElementById("catch-viewport").appendChild(item);
      }

      function updateCatch() {
        const basket = document.getElementById("basket");
        const items = document.getElementsByClassName("falling-item");
        for (let i = items.length - 1; i >= 0; i--) {
          let t = parseFloat(items[i].style.top);
          items[i].style.top = t + 4 + "px";
          if (t > 400) items[i].remove();
          else {
            let bRect = basket.getBoundingClientRect();
            let iRect = items[i].getBoundingClientRect();
            if (
              iRect.bottom >= bRect.top &&
              iRect.right >= bRect.left &&
              iRect.left <= bRect.right
            ) {
              if (items[i].dataset.type === "good") {
                catchScore += 10;
                document.getElementById("catch-score").innerText = catchScore;
                if (catchScore >= 100)
                  showEndScreen(
                    "Sjajno! 👝",
                    "Neseser je pun kvalitetne šminke!",
                  );
              } else {
                catchLives--;
                document.getElementById("catch-lives").innerText = "❤️".repeat(
                  Math.max(0, catchLives),
                );
                if (catchLives <= 0)
                  showEndScreen(
                    "Kraj! ❌",
                    "Uhvatila si previše loših stvari.",
                  );
              }
              items[i].remove();
            }
          }
        }
      }

      document.addEventListener("mousemove", (e) => {
        if (activeLevel === 2 && gameActiveLvl2) {
          let view = document
            .getElementById("catch-viewport")
            .getBoundingClientRect();
          let x = e.clientX - view.left;
          if (x > 30 && x < view.width - 30)
            document.getElementById("basket").style.left = x + "px";
        }
      });

      // --- LOGIKA NIVO 3 ---
      let sequence = [],
        userSequence = [],
        canClick = false,
        round = 0;
      function startLevel3() {
        document.getElementById("start-lvl3").style.display = "none";
        document.getElementById("ui-lvl3").style.display = "block";
        sequence = [];
        round = 0;
        nextRound();
      }

      function nextRound() {
        userSequence = [];
        round++;
        document.getElementById("rhythm-round").innerText = round;
        sequence.push(Math.floor(Math.random() * 4));
        playSequence();
      }

      function playSequence() {
        canClick = false;
        document.getElementById("rhythm-status").innerText = "Gledaj...";
        let i = 0;
        let int = setInterval(() => {
          const btn = document.getElementById(`r-${sequence[i]}`);
          btn.classList.add("highlight");
          setTimeout(() => btn.classList.remove("highlight"), 400);
          i++;
          if (i >= sequence.length) {
            clearInterval(int);
            canClick = true;
            document.getElementById("rhythm-status").innerText = "Ponovi!";
          }
        }, 800);
      }

      function rhythmClick(id) {
        if (!canClick) return;
        const btn = document.getElementById(`r-${id}`);
        btn.classList.add("highlight");
        setTimeout(() => btn.classList.remove("highlight"), 200);
        userSequence.push(id);
        if (
          userSequence[userSequence.length - 1] !==
          sequence[userSequence.length - 1]
        ) {
          showEndScreen("Pogrešan ritam! 🎵", `Stigla si do runde ${round}.`);
          return;
        }
        if (userSequence.length === sequence.length) {
          if (round === 5)
            showEndScreen("Savršeno! 🏆", "Tvoje pamćenje je vrhunsko!");
          else setTimeout(nextRound, 800);
        }
      }

      window.onload = () => loadLevel(1);
    </script>
  </body>
</html>
