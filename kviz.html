<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty World | 📝 Kviz Znanja</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="SLIKE/favicon.png" />
    <link rel="stylesheet" href="CSS/style.css" />
    <style>
      .border-pink {
        border: 2px solid var(--bebi-roze);
      }
      .btn-answer {
        background-color: white;
        border: 2px solid var(--bebi-roze);
        color: #555;
        transition: all 0.2s;
        padding: 10px;
        border-radius: 15px;
      }
      .btn-answer:hover {
        background-color: var(--bebi-roze);
        transform: scale(1.02);
      }
      .correct {
        background-color: #c8e6c9 !important;
        border-color: #4caf50 !important;
      }
      .wrong {
        background-color: #ffcdd2 !important;
        border-color: #f44336 !important;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg custom-nav sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span>✨</span> Beauty World <span>💄</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">🏠 Početna</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="beauty.html">🌸 Nega i Estetika</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="galerija.html">🖼️ Galerija</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="multimedija.html"
                >📂 Media & Dokumenti</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="kviz.html">📝 Kviz</a>
            </li>
            <li class="nav-item">
              <a class="nav-link btn-igra" href="igra.html">🎮 IGRA</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8 text-center">
          <h2 class="mb-4">✨ Proveri svoje znanje ✨</h2>
          <div
            id="quiz-box"
            class="p-5 shadow-sm bg-white rounded-4 border-pink"
          >
            <div id="question-container">
              <p class="text-muted">Pitanje <span id="q-num">1</span> od 10</p>
              <h4 id="question-text" class="mb-4">Učitavanje pitanja...</h4>
              <div id="answer-buttons" class="d-grid gap-3"></div>
            </div>

            <div id="result-container" class="d-none">
              <h2 class="mb-3">Kraj kviza! 🎉</h2>
              <h3>
                Tvoj rezultat:
                <span id="score-val" class="text-primary">0</span>/10
              </h3>
              <p id="feedback-text" class="lead my-4"></p>
              <button onclick="location.reload()" class="btn btn-custom">
                Pokušaj ponovo 🔄
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center py-5 mt-5">
      <div class="container">
        <div class="footer-emoji">💖 ✨ 🧴</div>
        <p>&copy; 2025 Osnove Multimedijalnih Tehnologija</p>
      </div>
    </footer>

    <script src="JS/kviz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
